name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    checks:
        name: Lint, format, test, build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Check formatting
              run: npm run format:check

            - name: Run ESLint
              run: npm run lint

            - name: Run tests
              run: npm run test

            - name: Test with coverage
              run: npm run coverage

            - name: Build package
              run: npm run build
